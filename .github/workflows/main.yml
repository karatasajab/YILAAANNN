name: APK-OTOMATIK-TAMIR-VE-RELEASER
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Spec Dosyasini Duvara Yapistir (BOSLUKLARI SIL)
        run: |
          # Satirin başindaki tüm boşluklari ve # işaretlerini temizler, duvara yapistirir
          sed -i 's/^[[:space:]#]*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          echo "Spec dosyasi cerrahi hassasiyetle tamir edildi!"

      - name: Java Hazirla
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Kutuphaneleri Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-dev zip unzip libtinfo5 libncurses5
          pip install --user --upgrade buildozer Cython==0.29.33 virtualenv
          export PATH=$PATH:$HOME/.local/bin

      - name: APK DERLE (ARTIK HATASIZ)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          yes | buildozer -v android debug

      - name: APK'YI RELEASES KISMINA FIRLAT
        uses: softprops/action-gh-release@v1
        with:
          files: bin/*.apk
          tag_name: v${{ github.run_number }}
          name: Yilan Oyunu APK v${{ github.run_number }}
          body: Boşluk hatasi giderildi, APK taze taze hazirlandi!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
