name: APK-HATA-AVCISI
on: [push, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Spec Dosyasini Cerrahi Olarak Onar
        run: |
          # Satir basindaki tüm görünmez bosluklari ve hatalari siler
          sed -i 's/^[[:space:]]*//' buildozer.spec
          sed -i 's/^[[:space:]#]*android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^[[:space:]#]*p4a.branch.*/p4a.branch = master/' buildozer.spec

      - name: Java ve Paketleri Kur
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev python3-dev zip unzip libtinfo5 libncurses5
          pip install --user --upgrade buildozer Cython==0.29.33 virtualenv
          export PATH=$PATH:$HOME/.local/bin

      - name: APK DERLE (HER DETAYI YAZDIR)
        run: |
          export PATH=$PATH:$HOME/.local/bin
          # Log seviyesini 2 yaparak hatanin neden 4. dakikada geldigini gorecegiz
          yes | buildozer -v android debug --loglevel=2

      - name: Basariliysa Release Yap
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          files: bin/*.apk
          tag_name: v${{ github.run_number }}
          name: Yilan Oyunu APK v${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
